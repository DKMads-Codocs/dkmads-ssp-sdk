name: dkmads_ssp
description: DKMads SSP Flutter wrapper over native iOS/Android SDKs.
version: 0.5.4
homepage: https://github.com/DKMads-Codocs/dkmads-ssp-sdk

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.dkmads.ssp.flutter
        pluginClass: DkmadsSspPlugin
      ios:
        pluginClass: DkmadsSspPlugin
